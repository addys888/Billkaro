version: '3.9'

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: billkaro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: billkaro
      POSTGRES_PASSWORD: billkaro_dev
      POSTGRES_DB: billkaro_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U billkaro -d billkaro_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: billkaro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer (DB Viewer) ────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: billkaro-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
